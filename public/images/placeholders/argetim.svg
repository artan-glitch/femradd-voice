<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C06A45;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9C5535;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" />
  <rect width="800" height="500" fill="url(#overlay)" />
  <text x="400" y="250" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="2">Argetim</text>
</svg>