<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" />
  <rect width="400" height="400" fill="url(#overlay)" />
  <!-- User silhouette icon -->
  <g transform="translate(200, 180)" fill="#ffffff" opacity="0.85">
    <!-- Head -->
    <circle cx="0" cy="-40" r="50" />
    <!-- Body/shoulders -->
    <path d="M-80,55 C-80,10 -50,-15 0,-15 C50,-15 80,10 80,55 L80,90 C80,100 70,110 60,110 L-60,110 C-70,110 -80,100 -80,90 Z" />
  </g>
</svg>