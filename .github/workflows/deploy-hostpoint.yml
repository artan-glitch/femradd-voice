name: Deploy to Hostpoint (FTP)

on:
  push:
    branches: [main]

concurrency:
  group: hostpoint-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: node scripts/generate-seo.mjs

      - run: npx vite build

      # Install Playwright and pre-render all routes for SEO
      - run: npx playwright install chromium --with-deps

      - run: node scripts/prerender.mjs

      # Add .htaccess for SPA routing on Apache
      - name: Add .htaccess
        run: |
          cat > dist/.htaccess << 'EOF'
          RewriteEngine On
          RewriteBase /
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [L]
          EOF
          # Remove leading whitespace from .htaccess
          sed -i 's/^[[:space:]]*//' dist/.htaccess

      # Deploy to Hostpoint via FTP
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: true
