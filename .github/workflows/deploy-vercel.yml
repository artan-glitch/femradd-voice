name: Deploy to Vercel (with pre-rendering)

on:
  push:
    branches: [main]

concurrency:
  group: vercel-deploy
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm install -g vercel@latest

      # Pull Vercel project settings
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Generate SEO files and build
      - run: node scripts/generate-seo.mjs
      - run: npx vite build

      # Install Playwright and pre-render all routes
      - run: npx playwright install chromium --with-deps
      - run: node scripts/prerender.mjs

      # Build Vercel output from pre-rendered dist
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Deploy to Vercel
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
