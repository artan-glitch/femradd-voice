name: Deploy to Vercel (with pre-rendering)

on:
  push:
    branches: [main]

concurrency:
  group: vercel-deploy
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm install -g vercel@latest

      # Pull Vercel project settings
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Generate SEO files and build
      - run: node scripts/generate-seo.mjs
      - run: npx vite build

      # Install Playwright and pre-render all routes
      - run: npx playwright install chromium --with-deps
      - run: node scripts/prerender.mjs

      # Create Vercel output structure with pre-rendered files
      - name: Prepare Vercel output
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          cat > .vercel/output/config.json << 'CONF'
          {
            "version": 3,
            "headers": [
              {
                "source": "/(.*)",
                "headers": [
                  { "key": "X-Frame-Options", "value": "DENY" },
                  { "key": "X-Content-Type-Options", "value": "nosniff" },
                  { "key": "X-XSS-Protection", "value": "1; mode=block" },
                  { "key": "Referrer-Policy", "value": "strict-origin-when-cross-origin" },
                  { "key": "Permissions-Policy", "value": "camera=(), microphone=(), geolocation=(), interest-cohort=()" },
                  { "key": "Content-Security-Policy", "value": "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://plausible.io https://www.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https://www.google-analytics.com https://plausible.io https://www.clarity.ms" }
                ]
              }
            ],
            "rewrites": [
              { "source": "/((?!assets|images|favicon|manifest|robots|sitemap|rss|og-image|apple-touch-icon|llms).*)", "destination": "/index.html" }
            ]
          }
          CONF
          sed -i 's/^[[:space:]]*//' .vercel/output/config.json

      # Deploy pre-built output to Vercel
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
