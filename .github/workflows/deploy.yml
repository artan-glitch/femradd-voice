name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/sad-cray]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: node scripts/generate-seo.mjs

      - run: npx vite build
        env:
          GITHUB_PAGES: true

      # Install Playwright and pre-render all routes for SEO
      - run: npx playwright install chromium --with-deps

      - run: node scripts/prerender.mjs
        env:
          GITHUB_PAGES: true

      # Copy index.html to 404.html so SPA routing works on GitHub Pages
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
